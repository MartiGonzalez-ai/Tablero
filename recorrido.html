<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Consulta de Recorrido Histórico - Geotab">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Recorrido por Unidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/Rendimiento.css">
    <link rel="stylesheet" href="styles/recorrido.css">
</head>
<body>
    <div id="app-recorrido">
        <!-- ═══════════ HEADER ═══════════ -->
        <header class="top-nav glass-panel">
            <div class="nav-brand">
                <i data-lucide="map-pin" width="28" height="28" stroke="var(--color-primary)" stroke-width="2.5"></i>
                <h1>Recorrido Unitario</h1>
            </div>
            
            <div class="filter-controls">
                <div class="filter-group">
                    <label for="unit-select-recorrido">Unidad</label>
                    <select id="unit-select-recorrido" class="recorrido-input-top">
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <!-- Date Range Presets -->
                <div class="date-range-group" id="period-presets">
                    <button class="btn-range" data-period="week">Esta semana</button>
                    <button class="btn-range active" data-period="month">Este mes</button>
                    <button class="btn-range" data-period="bimester">Bimestre</button>
                    <button class="btn-range" data-period="trimester">Trimestre</button>
                    <button class="btn-range" data-period="semester">6 meses</button>
                    <button class="btn-range btn-range--custom" id="btn-custom-range">
                        <i data-lucide="calendar" width="13" height="13" stroke-width="2.5"></i>
                        Personalizado
                    </button>
                </div>

                <!-- Hidden Custom Date Picker -->
                <div id="custom-date-wrapper" style="display: none;">
                    <input type="date" id="date-until" class="recorrido-input-top">
                </div>

                <button id="btn-consultar" class="btn-primary-top">
                    <i data-lucide="search" width="16" height="16"></i>
                    <span>Consultar</span>
                </button>
            </div>

            <div class="nav-status">
                <span class="status-dot"></span>
                <span id="last-updated-time">Geotab API</span>
            </div>
        </header>

        <!-- ═══════════ MAIN CONTENT ═══════════ -->
        <main class="recorrido-container">
            <div id="result-container" class="recorrido-content-grid" style="display: none;">
                <!-- KPI Cards Summary -->
                <div class="summary-strip" style="padding: 0; margin-bottom: 1.5rem;">
                    <div class="stat-card" data-color="cyan" style="flex: 1; min-width: 250px;">
                        <div class="stat-icon stat-icon--cyan">
                            <i data-lucide="gauge"></i>
                        </div>
                        <div class="stat-body">
                            <div class="stat-label">Odómetro Estimado</div>
                            <div class="stat-value">
                                <span id="distancia-value">0</span>
                                <span class="stat-value--sm">km</span>
                            </div>
                            <div class="stat-sub">Lectura al <span id="fecha-footer">—</span></div>
                        </div>
                    </div>

                    <div class="stat-card" data-color="blue" style="flex: 1; min-width: 250px;">
                        <div class="stat-icon stat-icon--blue">
                            <i data-lucide="route" width="20" height="20"></i>
                        </div>
                        <div class="stat-body">
                            <div class="stat-label">Distancia en Periodo</div>
                            <div class="stat-value">
                                <span id="distancia-periodo-value">0</span>
                                <span class="stat-value--sm">km</span>
                            </div>
                            <div class="stat-sub">Trayecto acumulado</div>
                        </div>
                    </div>
                </div>

                <!-- Simulación del Odómetro Total (Línea) -->
                <div class="chart-card glass-panel trend-chart-container">
                    <div class="panel-header" style="justify-content: space-between; display: flex; align-items: center;">
                        <div class="panel-title-group">
                            <i data-lucide="trending-up" width="16" height="16" stroke-width="2"></i>
                            <span>Tendencia del Odómetro Total (km)</span>
                        </div>
                        <div class="trend-filter-container">
                            <i data-lucide="calendar" width="14" height="14" stroke-width="2.5"></i>
                            <select id="trend-timeframe-select-odo" class="trend-select">
                                <option value="day" selected>Día</option>
                                <option value="week">Semana</option>
                                <option value="month">Mes</option>
                                <option value="bimester">Bimestre</option>
                                <option value="trimester">Trimestre</option>
                                <option value="6months">6 Meses</option>
                                <option value="year">Año</option>
                            </select>
                        </div>
                    </div>
                    <div id="chart-odo-trend" class="chart-container"></div>
                </div>

                <!-- Nueva Gráfica de Barras Diaria -->
                <div class="chart-card glass-panel">
                    <div class="panel-header" style="justify-content: space-between; display: flex; align-items: center;">
                        <div class="panel-title-group">
                            <i data-lucide="bar-chart-2" width="16" height="16" stroke-width="2"></i>
                            <span>Distancia Diaria (km)</span>
                        </div>
                        <div class="trend-filter-container">
                            <i data-lucide="calendar" width="14" height="14" stroke-width="2.5"></i>
                            <select id="trend-timeframe-select-daily" class="trend-select">
                                <option value="day" selected>Día</option>
                                <option value="week">Semana</option>
                                <option value="month">Mes</option>
                                <option value="bimester">Bimestre</option>
                                <option value="trimester">Trimestre</option>
                                <option value="6months">6 Meses</option>
                                <option value="year">Año</option>
                            </select>
                        </div>
                    </div>
                    <div id="chart-daily-recorrido" class="chart-container"></div>
                </div>

                <!-- Nueva tabla de distancia por día -->
                <div class="daily-table-container">
                        <div class="table-header">
                            <h3>Desglose por Día</h3>
                            <span id="label-periodo" class="label-periodo"></span>
                        </div>
                        <div class="table-scroll">
                            <table class="daily-recorrido-table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th style="text-align: right;">Distancia (km)</th>
                                        <th style="text-align: right;">Odómetro (km)</th>
                                    </tr>
                                </thead>
                                <tbody id="daily-recorrido-tbody">
                                    <!-- Rows populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="loading-overlay" class="loading-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <p>Calculando recorridos...</p>
                </div>
            </div>
        </main>

        <!-- Global Error Toast -->
        <div class="error-toast" id="error-toast" style="display:none;">
            <i data-lucide="alert-circle" width="16" height="16" stroke-width="2"></i>
            <span id="error-toast-msg">Error al consultar los datos.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="scripts/recorrido.js"></script>
</body>
</html>
