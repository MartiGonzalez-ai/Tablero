<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Consulta de Recorrido Histórico - Geotab">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Recorrido por Unidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/Rendimiento.css">
    <link rel="stylesheet" href="styles/recorrido.css">
</head>
<body>
    <div id="app-recorrido">
        <!-- ═══════════ HEADER ═══════════ -->
        <header class="top-nav glass-panel">
            <div class="nav-brand">
                <i data-lucide="map-pin" width="30" height="30" stroke="var(--color-primary)" stroke-width="2"></i>
                <div>
                    <h1>Recorrido por Unidad</h1>
                </div>
            </div>
            <div class="nav-controls">
                <div class="last-updated" id="last-updated-time">Geotab API</div>
            </div>
        </header>

        <!-- ═══════════ MAIN CONTENT ═══════════ -->
        <main class="recorrido-container">
            <div class="recorrido-card glass-panel">
                <div class="recorrido-header">
                    <h2>Consulta de Kilometraje</h2>
                    <p>Calcula la distancia total recorrida según el historial de viajes.</p>
                </div>

                <div class="recorrido-form">
                    <div class="input-group">
                        <label for="unit-select-recorrido">
                            <i data-lucide="truck" width="14" height="14"></i> Selecciona la Unidad
                        </label>
                        <select id="unit-select-recorrido" class="recorrido-input">
                            <option value="">Cargando unidades...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="date-until">
                            <i data-lucide="calendar" width="14" height="14"></i> Hasta qué fecha
                        </label>
                        <input type="date" id="date-until" class="recorrido-input">
                    </div>

                    <button id="btn-consultar" class="btn-primary-recorrido">
                        <i data-lucide="search" width="18" height="18"></i>
                        <span>Consultar Recorrido</span>
                    </button>
                </div>

                <div id="result-container" class="result-container" style="display: none;">
                    <div class="divider"></div>
                    <div class="result-card">
                        <div class="result-icon">
                            <i data-lucide="route" width="32" height="32"></i>
                        </div>
                        <div class="result-content">
                            <span class="result-label">Kilómetros Recorridos</span>
                            <div class="result-value-wrap">
                                <span id="distancia-value" class="result-value">0</span>
                                <span class="result-unit">km</span>
                            </div>
                            <p class="result-footer">Distancia acumulada hasta el <span id="fecha-footer">—</span></p>
                        </div>
                    </div>
                </div>

                <div id="loading-overlay" class="loading-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <p>Calculando recorridos...</p>
                </div>
            </div>
        </main>

        <!-- Global Error Toast -->
        <div class="error-toast" id="error-toast" style="display:none;">
            <i data-lucide="alert-circle" width="16" height="16" stroke-width="2"></i>
            <span id="error-toast-msg">Error al consultar los datos.</span>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="scripts/recorrido.js"></script>
</body>
</html>
