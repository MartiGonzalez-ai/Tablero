<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Dashboard de Conducta Agresiva - Geotab">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Conducta Agresiva - Geotab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/vendor.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/alarmas.css">
    <style>
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .chart-row--detail {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .table-panel {
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 1024px) {
            .chart-row--detail {
                grid-template-columns: 1fr;
            }
        }

        .stat-card[data-color="amber"] { border-left: 4px solid #f59e0b; }
        .stat-icon--amber { background: #fffbeb; color: #f59e0b; }
    </style>
</head>

<body>
    <div id="app-conducta-agresiva">

        <!-- ═══════════ HEADER ═══════════ -->
        <header class="top-nav glass-panel">
            <div class="nav-brand">
                <a href="alarmas.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="arrow-left" width="24" height="24" stroke-width="2"></i>
                </a>
                <i data-lucide="zap" width="30" height="30" stroke="#f59e0b" stroke-width="2"></i>
                <div>
                    <h1>Conducta Agresiva</h1>
                    <span class="nav-subtitle">Análisis Detallado de Excepciones</span>
                </div>
            </div>

            <div class="nav-controls">
                <div class="date-range-group" id="date-range-group">
                    <button class="btn-range active" data-days="7" id="btn-7d">7 días</button>
                    <button class="btn-range" data-days="15" id="btn-15d">15 días</button>
                    <button class="btn-range" data-days="30" id="btn-30d">30 días</button>
                </div>

                <div class="unit-filter-group" id="unit-filter-wrapper" style="display: flex; align-items: center; gap: 0.5rem; background: #fff; border: 1px solid var(--color-panel-border); border-radius: var(--radius-md); padding: 0 0.75rem;">
                    <i data-lucide="truck" width="14" height="14" stroke-width="2.5"></i>
                    <select id="unit-select" class="unit-select" style="border: none; padding: 0.45rem 0.5rem; font-family: var(--font); font-size: 0.8rem; font-weight: 600; outline: none; cursor: pointer;">
                        <option value="all">Todas las Unidades</option>
                    </select>
                </div>

                <button id="btn-refresh" class="btn-refresh">
                    <i data-lucide="refresh-cw" width="18" height="18" stroke-width="2.5"></i>
                </button>
            </div>
        </header>

        <!-- ═══════════ MAIN CONTENT ═══════════ -->
        <main class="main-content" style="display: flex; flex-direction: column; align-items: center; padding: 2rem;">
            
            <!-- Summary Stats -->
            <section class="summary-stats">
                <div class="stat-card glass-panel" data-color="amber">
                    <div class="stat-icon stat-icon--amber">
                        <i data-lucide="zap"></i>
                    </div>
                    <div class="stat-body">
                        <div class="stat-label">Total Alertas</div>
                        <div class="stat-value" id="stat-total-alerts">0</div>
                    </div>
                </div>
                <div class="stat-card glass-panel" data-color="rose">
                    <div class="stat-icon stat-icon--rose">
                        <i data-lucide="alert-triangle"></i>
                    </div>
                    <div class="stat-body">
                        <div class="stat-label">Unidades Críticas</div>
                        <div class="stat-value" id="stat-critical-units">0</div>
                    </div>
                </div>
                <div class="stat-card glass-panel" data-color="blue">
                    <div class="stat-icon stat-icon--blue">
                        <i data-lucide="clock"></i>
                    </div>
                    <div class="stat-body">
                        <div class="stat-label">Promedio Diario</div>
                        <div class="stat-value" id="stat-avg-daily">0</div>
                    </div>
                </div>
            </section>

            <!-- Charts Section -->
            <div class="chart-row--detail">
                <div class="chart-card glass-panel">
                    <div class="panel-header">
                        <div class="panel-title-group">
                            <i data-lucide="trending-up" width="18" height="18"></i>
                            <span>Tendencia de Eventos</span>
                        </div>
                    </div>
                    <div id="chart-trend" class="chart-container" style="height: 350px;"></div>
                </div>
                <div class="chart-card glass-panel">
                    <div class="panel-header">
                        <div class="panel-title-group">
                            <i data-lucide="pie-chart" width="18" height="18"></i>
                            <span>Distribución por Regla</span>
                        </div>
                    </div>
                    <div id="chart-rules" class="chart-container" style="height: 350px;"></div>
                </div>
            </div>

            <!-- Detailed Table -->
            <section class="panel glass-panel table-panel">
                <div class="panel-header">
                    <div class="panel-title-group">
                        <i data-lucide="list" width="18" height="18"></i>
                        <span>Ranking de Unidades por Conducta Agresiva</span>
                    </div>
                    <button class="btn-export-excel" id="btn-export">
                        <i data-lucide="download" width="14" height="14"></i>
                        Exportar
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="perf-table" id="ranking-table">
                        <thead>
                            <tr>
                                <th>Unidad</th>
                                <th style="text-align:right;">Frenado Brusco</th>
                                <th style="text-align:right;">Giro Brusco</th>
                                <th style="text-align:right;">Aceleración Brusca</th>
                                <th style="text-align:center; font-weight: 800;">Total</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-tbody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>

        <!-- Loading Overlay -->
        <div id="loading-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;">
            <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="scripts/vendor.js"></script>
    <script src="scripts/conducta_agresiva.js"></script>
</body>

</html>
