<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Xirgo Panel - Geotab Add-in">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Xirgo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #fff;
        }
        
        #app-xirgo {
            width: 100%;
            height: 100%;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app-xirgo">
        <!-- ═══════════ MAIN CONTENT ═══════════ -->
        <main class="iframe-container">
            <iframe 
                src="https://xirgo.app.em2m.net/login" 
                title="Xirgo Login"
                allow="geolocation; microphone; camera; midi; encrypted-media; storage-access"
                loading="lazy">
            </iframe>
        </main>
    </div>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
