<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Xirgo</title>
</head>
<body style="margin: 0; padding: 0;">
    <!-- Inline styles to bypass Geotab potentially stripping <style> tags -->
    <div id="app-xirgo" style="width: 100%; min-height: 850px; height: 850px; display: flex; flex-direction: column; background: #ffffff;">
        <iframe 
            src="https://xirgo.app.em2m.net/login" 
            title="Xirgo Login"
            allow="geolocation; microphone; camera; midi; encrypted-media; storage-access"
            loading="lazy"
            style="width: 100%; height: 100%; border: none; flex-grow: 1; min-height: 850px;">
        </iframe>
    </div>

    <script>
        geotab.addin.xirgo = function() {
            return {
                initialize: function(api, state, callback) {
                    callback();
                },
                focus: function() {
                    // Geotab gives focus to the add-in
                },
                blur: function() {
                    // Geotab removes focus from the add-in
                }
            };
        };
    </script>
</body>
</html>
