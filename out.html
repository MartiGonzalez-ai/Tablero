<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="Fleet Control – Control de Salidas IOX Geotab | Geotab Add-In">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fleet Control | IOX Output Control</title>
    
    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="styles/vendor.css">
    <link rel="stylesheet" href="styles/entradas.css">
    <link rel="stylesheet" href="styles/out.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Error Debugging Overlay -->
    <script>
        window.addEventListener('error', function(e) {
            var errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.top = '10px';
            errDiv.style.left = '10px';
            errDiv.style.right = '10px';
            errDiv.style.background = '#ef4444';
            errDiv.style.color = 'white';
            errDiv.style.padding = '15px';
            errDiv.style.borderRadius = '8px';
            errDiv.style.zIndex = '99999';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.fontSize = '12px';
            errDiv.style.whiteSpace = 'pre-wrap';
            errDiv.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
            errDiv.style.border = '1px solid rgba(255,255,255,0.2)';
            errDiv.innerHTML = '<strong>[Error de Script JS]</strong><br>' + e.message + '<br><br>Archivo: ' + e.filename + '<br>Línea: ' + e.lineno + ':' + e.colno;
            document.body.appendChild(errDiv);
        });
        window.addEventListener('unhandledrejection', function(e) {
            var errDiv = document.createElement('div');
            // Similar styling
            errDiv.style.position = 'fixed';
            errDiv.style.top = '10px';
            errDiv.style.left = '10px';
            errDiv.style.right = '10px';
            errDiv.style.background = '#f59e0b';
            errDiv.style.color = 'white';
            errDiv.style.padding = '15px';
            errDiv.style.borderRadius = '8px';
            errDiv.style.zIndex = '99999';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.fontSize = '12px';
            errDiv.style.whiteSpace = 'pre-wrap';
            errDiv.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
            errDiv.innerHTML = '<strong>[Promesa Rechazada No Manejada]</strong><br>' + (e.reason ? (e.reason.message || e.reason) : 'Desconocida');
            document.body.appendChild(errDiv);
        });
    </script>
</head>
<body>

    <!-- ═══════════ HEADER ═══════════ -->
    <header class="app-header">
        <div class="header-brand">
            <div class="brand-icon command-sender-brand">
                <i data-lucide="terminal" width="20" height="20"></i>
            </div>
            <div class="brand-text">
                <h1>Fleet Control</h1>
                <p>IOX Output Control</p>
            </div>
        </div>

        <!-- Controles y Estado de Conexión -->
        <div class="header-controls">
            <div class="connection-badge" id="connection-status-badge" data-mode="demo">
                <span class="pulse-dot"></span>
                <span id="connection-status-text">Cargando Estado...</span>
            </div>
            
            <button id="btn-refresh" class="btn-refresh" title="Actualizar datos">
                <i data-lucide="refresh-cw" width="14" height="14"></i>
                <span>Actualizar</span>
            </button>
        </div>
    </header>

    <!-- ═══════════ MAIN CONTENIDO SPLIT LAYOUT ═══════════ -->
    <main class="main-layout">

        <!-- Panel Izquierdo: Buscador y Lista de Vehículos -->
        <aside class="sidebar-panel">
            <div class="sidebar-header">
                <span class="sidebar-title">Seleccionar Unidad</span>
                <div class="search-input-wrap">
                    <i data-lucide="search" width="14" height="14"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Buscar unidad...">
                </div>
            </div>
            
            <!-- Listado de unidades -->
            <div id="vehicle-list-container" class="vehicle-list">
                <div class="loading-box">
                    <div class="spinner"></div>
                    <p style="font-size:0.75rem; margin-top:0.5rem; text-align:center;">Cargando unidades...</p>
                </div>
            </div>
        </aside>

        <!-- Panel Derecho: Configuración y Transmisión de Comandos -->
        <section class="details-panel" id="details-panel-container">
            <!-- Estado inicial vacío, se reemplaza al seleccionar una unidad -->
            <div class="empty-details-state">
                <i data-lucide="terminal" width="56" height="56"></i>
                <h3>Selecciona una unidad</h3>
                <p>Elige un vehículo de la lista de la izquierda para configurar y enviar comandos de control a su relevador IOX-OUTPUTM en tiempo real.</p>
            </div>
        </section>

    </main>

    <!-- TOAST CONTAINER -->
    <div class="toast-wrap" id="toast-wrap"></div>

    <!-- Scripts y Lógica -->
    <script src="scripts/vendor.js" defer></script>
    <script src="scripts/out.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
